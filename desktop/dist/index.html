<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aethra Kairos</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #05060c; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  .wrap { position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px; -webkit-user-select: none; user-select: none; }
  .orb { width: 84px; height: 84px; border-radius: 50%; position: relative;
    background: radial-gradient(circle at 50% 40%, rgba(110,231,255,.22), transparent 70%);
    box-shadow: 0 0 60px -8px rgba(110,231,255,.4); animation: breathe 2.6s ease-in-out infinite; }
  .orb::before { content: ''; position: absolute; inset: 26px; border-radius: 50%;
    border: 2px solid #6ee7ff; border-top-color: transparent; animation: spin 1.1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes breathe { 0%,100% { transform: scale(1); opacity: .9; } 50% { transform: scale(1.06); opacity: 1; } }
  .name { font-size: 15px; letter-spacing: .42em; text-transform: uppercase; color: #eaf2ff;
    font-weight: 600; padding-left: .42em; }
  .msg { font-size: 11px; letter-spacing: .06em; color: #5c6a86; height: 16px; }
  body.offline .orb::before { animation: none; border-top-color: rgba(110,231,255,.4); }
  @media (prefers-reduced-motion: reduce) { .orb, .orb::before { animation: none; } }
</style>
</head>
<body>
  <div class="wrap">
    <div class="orb" aria-hidden="true"></div>
    <div class="name">Aethra Kairos</div>
    <div class="msg" id="msg">tuning in…</div>
  </div>
  <script>
    // The native shell boots straight into the live player, so the content is
    // always the latest deploy — the app itself only updates for native changes.
    // Offline (a streaming player has little to do anyway): wait, retry, and go
    // the moment a connection returns.
    var LIVE = 'https://aethrakairos.com';
    var msg = document.getElementById('msg');
    var tries = 0, gone = false;
    function go(){ if (gone) return; gone = true; location.replace(LIVE); }
    function attempt(){
      if (navigator.onLine){ msg.textContent = 'connecting…'; go(); return; }
      document.body.classList.add('offline');
      msg.textContent = 'waiting for a connection…';
      tries++;
      setTimeout(attempt, Math.min(8000, 1000 * tries));
    }
    window.addEventListener('online', go);
    setTimeout(attempt, 650);   // a beat of branded splash, then into the light
  </script>
</body>
</html>
