# Build the native macOS app (Tauri) with two release channels.
#
#   • PR / manual "none"     → build a universal .dmg, upload as an artifact
#                              (no release). The compile check.
#   • Manual "dev"           → "Aethra Kairos Dev", side-by-side identity, published
#                              to a ROLLING pre-release (tag desktop-nightly). Dev
#                              users auto-update from that feed.
#   • Manual "stable" OR a   → stable "Aethra Kairos", published as a normal Release.
#     desktop-vX.Y.Z tag       Stable users auto-update from releases/latest. The manual
#                              "stable" run derives the tag from tauri.conf.json's version,
#                              so cutting a release is one click — no hand-pushed tag.
#
# Apple code-signing/notarization IS wired (the APPLE_* env below) but dormant
# until those secrets are set — until then builds are unsigned (first launch:
# right-click → Open; see aethrakairos.com/mac). Updater signing is separate: set
# the TAURI_SIGNING_PRIVATE_KEY secret to switch auto-update on for both channels.
name: desktop

on:
  # reusable — the auto-nightly workflow calls this with channel: dev, so native
  # edits merged to main ship to the Dev channel automatically (parity).
  workflow_call:
    inputs:
      channel:
        description: 'Release channel'
        type: string
        default: none
  workflow_dispatch:
    inputs:
      channel:
        description: 'none = validation only · dev = rolling nightly · stable = cut a real release (tag from tauri.conf.json version)'
        type: choice
        options: [none, dev, stable]
        default: none
  pull_request:
    paths:
      - 'desktop/**'
      - '.github/workflows/desktop.yml'
  push:
    tags: ['desktop-v*']

concurrency:
  group: desktop-${{ github.ref }}-${{ inputs.channel }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain (both Apple arches)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      # Decide channel, config overlays, and release target. Updater artifacts are
      # SIGNED, so only overlay tauri.updater.json when the signing key is present —
      # otherwise unsigned builds would fail trying to sign with an empty key.
      - name: Plan the build
        id: plan
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          CHANNEL: ${{ inputs.channel }}
        run: |
          SIGN=""
          [ -n "$KEY" ] && SIGN=" --config src-tauri/tauri.updater.json"
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            # stable via a pushed desktop-vX.Y.Z tag
            echo "mode=stable" >> "$GITHUB_OUTPUT"
            echo "args=--target universal-apple-darwin$SIGN" >> "$GITHUB_OUTPUT"
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "name=Aethra Kairos ${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [ "$CHANNEL" = "stable" ]; then
            # stable via manual dispatch — derive the tag from the app version, so
            # cutting a release is one click (Actions -> Run workflow -> stable); no
            # hand-pushed tag. tauri-action creates the tag + release from this commit.
            VER=$(jq -r .version desktop/src-tauri/tauri.conf.json)
            echo "mode=stable" >> "$GITHUB_OUTPUT"
            echo "args=--target universal-apple-darwin$SIGN" >> "$GITHUB_OUTPUT"
            echo "tag=desktop-v$VER" >> "$GITHUB_OUTPUT"
            echo "name=Aethra Kairos desktop-v$VER" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif [ "$CHANNEL" = "dev" ]; then
            echo "mode=dev" >> "$GITHUB_OUTPUT"
            echo "args=--target universal-apple-darwin --config src-tauri/tauri.dev.json$SIGN" >> "$GITHUB_OUTPUT"
            echo "tag=desktop-nightly" >> "$GITHUB_OUTPUT"
            echo "name=Aethra Kairos Dev (nightly)" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "mode=validate" >> "$GITHUB_OUTPUT"
            echo "args=--target universal-apple-darwin" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "name=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      # Apple signing is triggered merely by these vars being PRESENT — an empty
      # APPLE_CERTIFICATE makes the bundler try to `security import` nothing and
      # fail. So export them (into $GITHUB_ENV, for the build step) ONLY when a
      # cert is actually set; absent → a clean unsigned build. This is the gate
      # that keeps notarization dormant until the secrets exist.
      - name: Enable Apple signing when configured
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "Apple signing not configured — unsigned build."
            exit 0
          fi
          echo "Apple signing configured — this build will be signed + notarized."
          {
            echo "APPLE_CERTIFICATE<<__AK_CERT__"
            echo "$APPLE_CERTIFICATE"
            echo "__AK_CERT__"
            echo "APPLE_CERTIFICATE_PASSWORD=$APPLE_CERTIFICATE_PASSWORD"
            echo "APPLE_SIGNING_IDENTITY=$APPLE_SIGNING_IDENTITY"
            echo "APPLE_ID=$APPLE_ID"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
          } >> "$GITHUB_ENV"

      - name: Build (and release for stable / dev)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple signing vars arrive via $GITHUB_ENV from the step above — set
          # only when a cert is configured, so unsigned builds carry none of them.
        with:
          projectPath: desktop
          args: ${{ steps.plan.outputs.args }}
          tagName: ${{ steps.plan.outputs.tag }}
          releaseName: ${{ steps.plan.outputs.name }}
          releaseBody: "The native Mac app. Install help — aethrakairos.com/mac (first launch: right-click → Open). Universal .dmg; it self-updates from here on."
          releaseDraft: false
          prerelease: ${{ steps.plan.outputs.prerelease }}

      # A STABLE-named copy of the .dmg so the website can link to a permanent,
      # never-rot URL: releases/latest/download/Aethra-Kairos-macOS-universal.dmg
      # always resolves to the newest stable build (the versioned filename can't).
      - name: Publish a stable-named .dmg for the website
        if: ${{ steps.plan.outputs.mode != 'validate' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DMG=$(ls desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          echo "built: $DMG"
          cp "$DMG" "Aethra-Kairos-macOS-universal.dmg"
          gh release upload "${{ steps.plan.outputs.tag }}" "Aethra-Kairos-macOS-universal.dmg" --clobber --repo "${{ github.repository }}"

      - name: Upload .dmg artifact (validation builds)
        if: ${{ steps.plan.outputs.mode == 'validate' }}
        uses: actions/upload-artifact@v4
        with:
          name: aethra-kairos-macos
          path: desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: warn
