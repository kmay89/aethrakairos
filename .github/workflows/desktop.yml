# Build the native macOS app (Tauri) and publish an auto-updating release.
#
#   • Manual run (workflow_dispatch): builds a universal .dmg and uploads it as a
#     workflow artifact — a no-release validation build.
#   • Tag push `desktop-v*`: builds AND publishes a GitHub Release with the .dmg
#     plus the updater feed (latest.json + signature), which the installed app
#     reads to update itself.
#
# Apple code-signing/notarization is intentionally NOT wired yet (the app ships
# unsigned for now — first launch is right-click → Open). Updater signing is a
# SEPARATE key: set the TAURI_SIGNING_PRIVATE_KEY secret to switch auto-update on.
name: desktop

on:
  workflow_dispatch:
  push:
    tags: ['desktop-v*']

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain (both Apple arches)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Install desktop deps
        working-directory: desktop
        run: npm ci

      - name: Build (and release on a desktop-v* tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing — set this secret to emit signed update artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          args: --target universal-apple-darwin
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && 'desktop-v__VERSION__' || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && 'Aethra Kairos __VERSION__' || '' }}
          releaseBody: "The native Mac app. Drag Aethra Kairos to Applications — it self-updates from here on. First launch on an unsigned build: right-click the app → Open."
          releaseDraft: false
          prerelease: false

      - name: Upload .dmg artifact (validation builds)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: aethra-kairos-macos
          path: desktop/src-tauri/target/**/release/bundle/dmg/*.dmg
          if-no-files-found: warn
