# Keep the catalog's per-track STRUCTURE fresh, automatically.
#
# Runs the pure-numpy enrichment (tools/enrich_structure.py) that derives each
# track's sections / apex / mix-in-out from the band-energy score already in
# catalog.json — no audio decode, so the whole catalog processes in seconds on a
# free CPU runner. It commits the refreshed catalog.json back to main.
#
# Triggers on new audio (a release), on changes to the enricher itself, weekly,
# or on demand. NOT on catalog.json, and the commit carries [skip ci], so it
# never re-triggers itself.
#
# NOTE on branch protection: this job PUSHES to main. If you enable branch
# protection requiring a PR, add an allowance for the GitHub Actions bot to
# bypass it (Settings → Branches → your rule → "Allow specified actors to
# bypass"), or switch this job to open a PR instead of pushing.
name: Enrich catalog structure

on:
  push:
    branches: [main]
    paths:
      - 'docs/audio/**'
      - 'tools/enrich_structure.py'
      - '.github/workflows/enrich.yml'
  schedule:
    - cron: '17 6 * * 1'     # Mondays, a quiet hour (UTC)
  workflow_dispatch:

concurrency:
  group: enrich-structure
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install numpy
        run: pip install --quiet numpy
      - name: Verify the structure port
        run: python3 tools/enrich_structure.py --selftest
      - name: Enrich catalog.json
        run: python3 tools/enrich_structure.py
      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain docs/catalog.json)" ]]; then
            git config user.name  "aethra-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/catalog.json
            git commit -m "chore: refresh mix.structure (auto-enrich) [skip ci]"
            git push
            echo "structure refreshed and pushed"
          else
            echo "no structure changes"
          fi
